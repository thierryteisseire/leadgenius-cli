<!DOCTYPE html>
<html>
<head>
  <title>LeadGenius Pro</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; width: 320px; margin: 0; }
    h3 { margin: 0 0 12px; }
    button { width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-google { background: #4285f4; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-google:hover { background: #3367d6; }
    .btn-test { background: #28a745; color: white; }
    .btn-test:hover { background: #218838; }
    .btn-logout { background: #dc3545; color: white; }
    .btn-logout:hover { background: #c82333; }
    .btn-open { background: #6c63ff; color: white; }
    .btn-open:hover { background: #5a52d5; }
    #result { margin-top: 8px; font-size: 11px; white-space: pre-wrap; background: #f8f9fa; padding: 8px; border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; }
    .user-info { background: #e8f5e9; padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; }
    .user-info strong { display: block; margin-bottom: 2px; }
    .hidden { display: none; }
    .divider { border-top: 1px solid #eee; margin: 10px 0; }
  </style>
</head>
<body>
  <h3>LeadGenius Pro</h3>

  <div id="loggedOut">
    <button id="googleSignIn" class="btn-google">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.5 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.9 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.9 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.8 13.4-4.9l-6.2-5.2C29.2 35.5 26.7 36 24 36c-5.4 0-9.9-3.5-11.3-8.5l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6.2 5.2C36.9 39.1 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
      Sign in with Google
    </button>
    <button id="emailSignIn" class="btn-test" style="background:#007bff">Sign in with Email</button>
  </div>

  <div id="loggedIn" class="hidden">
    <div id="userInfo" class="user-info"></div>
    <button id="openApp" class="btn-open">Open LeadGenius App</button>
    <button id="authTest" class="btn-test">Test API Connection</button>
    <button id="signOut" class="btn-logout">Sign Out</button>
  </div>

  <div class="divider"></div>
  <div id="result">Ready.</div>

  <script src="popup.js" type="module"></script>
</body>
</html>
