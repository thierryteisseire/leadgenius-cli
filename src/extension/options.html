<!DOCTYPE html>
<html>
<head>
  <title>LeadGenius Pro Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; width: 400px; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .status { margin-top: 10px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <div class="field">
    <label for="apiKey">API Key (lgp_...)</label>
    <input type="text" id="apiKey" placeholder="lgp_xxxxxxxx">
  </div>
  <div class="field">
    <label for="baseUrl">Base URL</label>
    <input type="text" id="baseUrl" value="https://api.leadgenius.app">
  </div>
  <button id="save">Save Settings</button>
  <div id="status" class="status"></div>
  <script src="options.js" type="module"></script>
</body>
</html>
